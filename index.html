<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocabulary Flashcards</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --accent: #7c3aed;
      --accent2: #a78bfa;
      --accent3: #c4b5fd;
      --text: #f1f0ff;
      --text2: #a09cb8;
      --text3: #6b6580;
      --border: rgba(124,58,237,0.2);
      --glow: rgba(124,58,237,0.4);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
      color: var(--text);
    }

    /* Background gradient blobs */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px;
      right: -200px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(167,139,250,0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, var(--accent3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .header p {
      color: var(--text3);
      font-size: 0.88rem;
      font-weight: 400;
    }

    /* Progress bar */
    .progress-wrap {
      width: 100%;
      margin-bottom: 24px;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .progress-label {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text3);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .progress-count {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--accent2);
    }

    .progress-bar-bg {
      width: 100%;
      height: 3px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* Card */
    .scene {
      width: 100%;
      height: 260px;
      perspective: 1200px;
      cursor: pointer;
      margin-bottom: 24px;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.flipped { transform: rotateY(180deg); }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px;
      border: 1px solid var(--border);
    }

    .front {
      background: linear-gradient(145deg, var(--surface) 0%, var(--surface2) 100%);
      box-shadow: 0 0 0 1px var(--border), 0 20px 60px rgba(0,0,0,0.4), 0 0 40px var(--glow);
    }

    .back {
      background: linear-gradient(145deg, var(--accent) 0%, #5b21b6 100%);
      transform: rotateY(180deg);
      box-shadow: 0 0 0 1px rgba(167,139,250,0.3), 0 20px 60px rgba(0,0,0,0.4), 0 0 60px rgba(124,58,237,0.5);
      border-color: rgba(167,139,250,0.2);
    }

    .face .badge {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 99px;
      white-space: nowrap;
    }

    .front .badge {
      background: rgba(124,58,237,0.15);
      color: var(--accent2);
      border: 1px solid var(--border);
    }

    .back .badge {
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .face .main-text {
      font-size: 2.2rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.2;
    }

    .back .main-text {
      font-size: 1.05rem;
      font-weight: 400;
      line-height: 1.65;
      color: rgba(255,255,255,0.92);
    }

    .flip-hint {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .flip-hint svg { opacity: 0.5; }

    /* Controls */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 36px;
      width: 100%;
    }

    .btn {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: inherit;
    }

    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.3; cursor: default; transform: none; }

    .btn-nav {
      background: var(--surface);
      color: var(--text2);
      border: 1px solid var(--border);
      flex: 0 0 auto;
      width: 52px;
      flex: none;
    }

    .btn-nav:hover:not(:disabled) {
      background: var(--surface2);
      border-color: var(--accent);
      color: var(--text);
    }

    .btn-shuffle {
      background: var(--surface);
      color: var(--text2);
      border: 1px solid var(--border);
    }

    .btn-shuffle:hover {
      background: rgba(124,58,237,0.1);
      border-color: var(--accent);
      color: var(--accent2);
    }

    /* Word list */
    .list-section {
      width: 100%;
    }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .list-title {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
    }

    .list-count {
      font-size: 0.78rem;
      color: var(--text3);
      background: var(--surface);
      padding: 2px 10px;
      border-radius: 99px;
      border: 1px solid var(--border);
    }

    .word-list { display: flex; flex-direction: column; gap: 6px; }

    .word-item {
      background: var(--surface);
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .word-item:hover {
      background: var(--surface2);
      border-color: var(--border);
    }

    .word-item.active {
      background: rgba(124,58,237,0.12);
      border-color: var(--accent);
    }

    .word-item .w {
      font-weight: 600;
      font-size: 0.92rem;
      color: var(--text);
    }

    .word-item.active .w { color: var(--accent2); }

    .word-item .d {
      font-size: 0.78rem;
      color: var(--text3);
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: right;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>Vocabulary Flashcards</h1>
    <p>Click the card to reveal the definition</p>
  </div>

  <div class="progress-wrap">
    <div class="progress-row">
      <span class="progress-label">Progress</span>
      <span class="progress-count" id="progress-count">1 / 20</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-bar" style="width:5%"></div>
    </div>
  </div>

  <div class="scene" onclick="flip()">
    <div class="card" id="card">
      <div class="face front">
        <span class="badge">Word</span>
        <span class="main-text" id="front-word"></span>
        <span class="flip-hint">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
          tap to flip
        </span>
      </div>
      <div class="face back">
        <span class="badge">Definition</span>
        <span class="main-text" id="back-def"></span>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-nav" id="prev-btn" onclick="prev()" title="Previous">←</button>
    <button class="btn btn-shuffle" onclick="shuffle()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="M15 15l5.1 5.1"/><path d="M4 4l5 5"/></svg>
      Shuffle
    </button>
    <button class="btn btn-nav" id="next-btn" onclick="next()" title="Next">→</button>
  </div>

  <div class="list-section">
    <div class="list-header">
      <span class="list-title">All words</span>
      <span class="list-count" id="list-count">20 words</span>
    </div>
    <div class="word-list" id="word-list"></div>
  </div>

</div>

<script>
  const WORDS = [
    { word: "Aberrant",     def: "Departing from an accepted standard; unusual or unexpected." },
    { word: "Benevolent",   def: "Well-meaning and kindly; showing goodwill." },
    { word: "Candid",       def: "Truthful and straightforward; frank." },
    { word: "Diligent",     def: "Having or showing care and conscientiousness in one's work." },
    { word: "Ephemeral",    def: "Lasting for a very short time." },
    { word: "Fervent",      def: "Having or displaying a passionate intensity." },
    { word: "Garrulous",    def: "Excessively talkative, especially on trivial matters." },
    { word: "Haphazard",    def: "Lacking any obvious principle of organization; random." },
    { word: "Implicit",     def: "Suggested though not directly expressed; understood." },
    { word: "Jubilant",     def: "Feeling or expressing great happiness and triumph." },
    { word: "Kindle",       def: "To light or set on fire; to arouse or inspire a feeling." },
    { word: "Lament",       def: "To mourn a loss or express sorrow or regret." },
    { word: "Meticulous",   def: "Showing great attention to detail; very careful and precise." },
    { word: "Nonchalant",   def: "Feeling or appearing casually calm and relaxed." },
    { word: "Ostentatious", def: "Characterized by vulgar or pretentious display; designed to impress." },
    { word: "Pragmatic",    def: "Dealing with things sensibly and realistically." },
    { word: "Quandary",     def: "A state of perplexity or uncertainty over what to do." },
    { word: "Resilient",    def: "Able to withstand or recover quickly from difficult conditions." },
    { word: "Stoic",        def: "Enduring pain or hardship without showing feelings or complaining." },
    { word: "Tenacious",    def: "Tending to keep a firm hold; persistent." },
  ];

  let deck = [...WORDS], idx = 0, isFlipped = false;

  function render() {
    const e = deck[idx];
    document.getElementById('front-word').textContent = e.word;
    document.getElementById('back-def').textContent = e.def;
    const pct = Math.round(((idx + 1) / deck.length) * 100);
    document.getElementById('progress-count').textContent = `${idx + 1} / ${deck.length}`;
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('prev-btn').disabled = idx === 0;
    document.getElementById('next-btn').disabled = idx === deck.length - 1;
    isFlipped = false;
    document.getElementById('card').classList.remove('flipped');
    document.querySelectorAll('.word-item').forEach((el, i) => {
      el.classList.toggle('active', deck[i] === e);
      if (deck[i] === e) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    });
  }

  function flip() {
    isFlipped = !isFlipped;
    document.getElementById('card').classList.toggle('flipped', isFlipped);
  }

  function next() { if (idx < deck.length - 1) { idx++; render(); } }
  function prev() { if (idx > 0) { idx--; render(); } }

  function shuffle() {
    for (let i = deck.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [deck[i], deck[j]] = [deck[j], deck[i]];
    }
    idx = 0; render();
  }

  function buildList() {
    const list = document.getElementById('word-list');
    document.getElementById('list-count').textContent = deck.length + ' words';
    deck.forEach((e, i) => {
      const el = document.createElement('div');
      el.className = 'word-item';
      el.innerHTML = `<span class="w">${e.word}</span><span class="d">${e.def}</span>`;
      el.onclick = () => { idx = i; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
      list.appendChild(el);
    });
  }

  buildList();
  render();

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') next();
    else if (e.key === 'ArrowLeft') prev();
    else if (e.key === ' ') { e.preventDefault(); flip(); }
  });
</script>
</body>
</html>
